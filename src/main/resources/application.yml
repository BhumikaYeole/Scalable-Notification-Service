spring:

  jackson:
    time-zone: Asia/Kolkata

  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

guardian:
  escalation:
    max-level: 3
    delay:
      LOW: 60
      MEDIUM: 30
      HIGH: 15
      CRITICAL: 5

server:
  port: 8080